<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="home.css">
</head>
<body>

    <div class="form-box">
        <h2>Create Account</h2>

        <input type="text" id="signup-name" placeholder="Name"><br>
        <input type="email" id="signup-email" placeholder="Email"><br>
        <input type="password" id="signup-password" placeholder="Password"><br>

        <button onclick="signup()">Sign Up</button>

        <p class="switch">Already have an account?<a href="login.html">Login</a></p>
    </div>

    
    <script src="home.js"></script>
</body>
</html>
